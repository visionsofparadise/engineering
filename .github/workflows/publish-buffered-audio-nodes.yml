name: Publish Buffered Audio Nodes

on:
  push:
    branches: [main]
    paths:
      - 'packages/buffered-audio-nodes/package.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@11

      - name: Check if version is already published
        id: check
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/buffered-audio-nodes/package.json').version")
          PUBLISHED=$(npm view @e9g/buffered-audio-nodes@$PACKAGE_VERSION version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$PACKAGE_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: npm ci

      - name: Type check and lint
        if: steps.check.outputs.skip == 'false'
        run: npm run check --workspace=packages/buffered-audio-nodes

      - name: Run unit tests
        if: steps.check.outputs.skip == 'false'
        run: npm run unit --workspace=packages/buffered-audio-nodes

      - name: Build
        if: steps.check.outputs.skip == 'false'
        run: npm run build --workspace=packages/buffered-audio-nodes

      - name: Publish to npm
        if: steps.check.outputs.skip == 'false'
        run: npm publish --workspace=packages/buffered-audio-nodes --access public
