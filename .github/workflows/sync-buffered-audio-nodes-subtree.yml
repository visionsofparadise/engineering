name: Sync Buffered Audio Nodes Subtree

on:
  push:
    branches: [main]
    paths:
      - 'packages/buffered-audio-nodes/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push subtree
        run: git push --force https://x-access-token:${{ secrets.SUBTREE_PAT }}@github.com/visionsofparadise/buffered-audio-nodes.git $(git subtree split --prefix=packages/buffered-audio-nodes):refs/heads/main
