name: Release Desktop

on:
  push:
    branches:
      - main
    paths:
      - 'apps/desktop/package.json'

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: check
        run: |
          current=$(node -p "require('./apps/desktop/package.json').version")
          previous=$(git show HEAD~1:apps/desktop/package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")
          echo "version=$current" >> "$GITHUB_OUTPUT"
          if [ "$current" != "$previous" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          cache: npm

      - run: npm ci

      - uses: actions/cache@v4
        with:
          path: .binaries-cache
          key: binaries-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('binaries.manifest.json') }}
          restore-keys: |
            binaries-${{ matrix.platform }}-${{ matrix.arch }}-

      - name: Fetch and install binaries
        run: npm run binaries:install -- --target=${{ matrix.platform }}-${{ matrix.arch }}

      - run: npm run make --workspace desktop

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-artifacts-${{ matrix.platform }}
          path: apps/desktop/out/make/**/*
          if-no-files-found: error

  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - run: find artifacts -type f | head -50

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-v${{ needs.check-version.outputs.version }}
          draft: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.nupkg
            artifacts/**/*.zip
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
